name: Smoke Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    # Nightly Tier 2 AI smoke at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      run_ai:
        description: Run Tier 2 AI smoke tests
        type: boolean
        default: false

concurrency:
  group: smoke-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Tier 1 smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Tier 1 smoke tests
        run: npm run test:smoke
        env:
          CI: true
          PRUDENS_TEST_EMAIL: ${{ secrets.PRUDENS_TEST_EMAIL }}
          PRUDENS_TEST_PASSWORD: ${{ secrets.PRUDENS_TEST_PASSWORD }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-tier1
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-tier1
          path: test-results/
          retention-days: 7

  smoke-ai:
    name: Tier 2 AI smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')) ||
      (github.event_name == 'workflow_dispatch' && inputs.run_ai)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Tier 2 AI smoke tests
        run: npm run test:smoke-ai
        env:
          CI: true
          PRUDENS_TEST_EMAIL: ${{ secrets.PRUDENS_TEST_EMAIL }}
          PRUDENS_TEST_PASSWORD: ${{ secrets.PRUDENS_TEST_PASSWORD }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-tier2-ai
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-tier2-ai
          path: test-results/
          retention-days: 7
